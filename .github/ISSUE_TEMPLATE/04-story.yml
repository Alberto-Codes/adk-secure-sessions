name: Story
description: BMAD user story (typically created by create-story workflow)
title: "Story N.N: "
labels: ["story"]
body:
  - type: markdown
    attributes:
      value: |
        # User Story

        Stories are normally created by the BMAD `create-story` workflow.
        Manual creation is supported for ad-hoc work outside the sprint plan.

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: |
        **As a** [role], **I want** [action], **so that** [benefit].
      placeholder: |
        As a developer using ADK sessions,
        I want field-level encryption on sensitive state,
        so that PII is protected at rest.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Checklist of criteria that must be met.
      placeholder: |
        - [ ] Session state fields are encrypted before persistence
        - [ ] Decryption is transparent on session retrieval
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Epic, story file, and branch references.
      value: |
        - **Epic**:
        - **Story file**:
        - **Branch**: `feat/`
    validations:
      required: false
