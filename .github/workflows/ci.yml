name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv cache prune --ci
        if: always()
        continue-on-error: true

  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv run ty check src/
      - run: uv cache prune --ci
        if: always()
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        adk-version: ["1.22.0", "latest"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: py${{ matrix.python-version }}-adk${{ matrix.adk-version }}
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --dev
        env:
          UV_PYTHON: ${{ matrix.python-version }}
      - name: Pin google-adk to specific version
        if: matrix.adk-version != 'latest'
        run: uv pip install --force-reinstall google-adk==${{ matrix.adk-version }}
      - run: uv run pytest --tb=short --cov=adk_secure_sessions --cov-report=term-missing --cov-fail-under=90
        env:
          UV_PYTHON: ${{ matrix.python-version }}
      - run: uv cache prune --ci
        if: always()
        continue-on-error: true

  interrogate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv run interrogate -v .
      - run: uv cache prune --ci
        if: always()
        continue-on-error: true

  docvet:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: Alberto-Codes/docvet@v1
        with:
          args: "check --all"
