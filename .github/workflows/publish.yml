name: Publish to PyPI

# Triggered when release-please (or manual) creates a version tag.
# Requires RELEASE_PLEASE_TOKEN (PAT with repo scope) in release-please.yml —
# tags created by GITHUB_TOKEN do NOT trigger other workflows.
on:
  push:
    tags:
      - "v*"

# Least-privilege: read-only by default; publish jobs escalate per-job.
permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false # never cancel an in-flight publish

jobs:
  # ---------------------------------------------------------------------------
  # Quality gate — runs the FULL test/lint/audit suite independently.
  # This deliberately duplicates ci.yml. A security library must not trust
  # branch-protection alone; the artifact we ship to PyPI is verified here.
  # See: Architecture doc "publish pipeline must be independently verified"
  # ---------------------------------------------------------------------------
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12

      - name: Check lockfile freshness
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check src/

      - name: Tests with coverage
        run: uv run pytest --tb=short --cov=adk_secure_sessions --cov-report=term-missing --cov-fail-under=90

      - name: Vulnerability scan
        run: uv run uv-secure

      - name: Dependency audit (runtime only)
        run: |
          uv pip compile pyproject.toml -o /tmp/requirements.txt
          uv run pip-audit -r /tmp/requirements.txt

      - run: uv cache prune --ci
        if: always()
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Build — produce sdist + wheel, smoke test install, upload as artifact.
  # ---------------------------------------------------------------------------
  build:
    needs: [quality-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12

      - name: Build distributions
        run: uv build

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "::error::Tag version ${TAG_VERSION} does not match pyproject.toml version ${TOML_VERSION}"
            exit 1
          fi
          echo "Version ${TAG_VERSION} matches — OK"

      - name: Install and verify wheel
        run: |
          uv venv /tmp/smoke --python 3.12
          SMOKE=/tmp/smoke/bin
          uv pip install --python "$SMOKE/python" dist/*.whl
          "$SMOKE/python" -c "from adk_secure_sessions import EncryptedSessionService, FernetBackend; print('Import smoke test — OK')"
          echo "Wheel installs and imports correctly — OK"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish to PyPI — production release.
  # Uses OIDC trusted publishing (no stored tokens).
  # ---------------------------------------------------------------------------
  publish-pypi:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          ignore-empty-workdir: true
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/
