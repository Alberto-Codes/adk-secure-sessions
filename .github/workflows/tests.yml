name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
        adk-version: ["1.22.0", "latest"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Pin google-adk to minimum version
        if: matrix.adk-version != 'latest'
        run: uv pip install google-adk==${{ matrix.adk-version }}

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check src/

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=adk_secure_sessions --cov-report=term-missing --cov-fail-under=90 -v
