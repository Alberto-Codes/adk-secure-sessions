site_name: adk-secure-sessions
site_description: Encrypted session storage for Google ADK
site_url: https://alberto-codes.github.io/adk-secure-sessions/
repo_url: https://github.com/Alberto-Codes/adk-secure-sessions
repo_name: Alberto-Codes/adk-secure-sessions

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tooltips
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

extra_css:
  - stylesheets/theme.css

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            # Docstring parsing
            docstring_style: google
            docstring_section_style: spacy

            # Source display
            show_source: true
            show_root_heading: true
            show_root_full_path: false

            # Symbol type display
            show_symbol_type_heading: true
            show_symbol_type_toc: true

            # Member ordering
            members_order: source
            group_by_category: true
            show_submodules: false

            # Avoid duplicate symbols from re-exports in __init__.py
            inherited_members: false

            # Signature rendering
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true

            # Inheritance
            show_bases: true
            show_inheritance_diagram: true

            # Griffe extensions
            extensions:
              - griffe_inherited_docstrings
              - griffe_warnings_deprecated
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - glightbox
  - minify:
      minify_html: true
  - macros

markdown_extensions:
  # Mermaid diagrams
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # Code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

  # Icons and emojis
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # Admonitions
  - admonition
  - pymdownx.details

  # Cross-references and TOC
  - toc:
      permalink: true
  - attr_list
  - md_in_html

  # Tables
  - tables

  # Definition lists
  - def_list

extra:
  project_name: adk-secure-sessions
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Alberto-Codes/adk-secure-sessions
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/adk-secure-sessions/

copyright: >
  Copyright &copy; 2026 Alberto-Codes -
  <a href="https://github.com/Alberto-Codes/adk-secure-sessions/blob/HEAD/LICENSE">Apache 2.0 License</a>

not_in_nav: |
  project-overview.md
  source-tree-analysis.md
  reference/SUMMARY.md
  reference/**/*.md

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
      - Overview: reference/index.md
      - Full Module Index: reference/adk_secure_sessions/index.md
  - Architecture:
      - Overview: ARCHITECTURE.md
      - Envelope Protocol: envelope-protocol.md
      - Algorithm Documentation: algorithms.md
      - Decisions:
          - adr/index.md
          - Direct Implementation: adr/ADR-000-strategy-decorator-architecture.md
          - Protocol Interfaces: adr/ADR-001-protocol-based-interfaces.md
          - Async-First: adr/ADR-002-async-first.md
          - Field-Level Encryption: adr/ADR-003-field-level-encryption.md
          - ADK Schema Compatibility: adr/ADR-004-adk-schema-compatibility.md
          - Exception Hierarchy: adr/ADR-005-exception-hierarchy.md
          - Configuration Error: adr/ADR-006-configuration-error.md
  - Roadmap: ROADMAP.md
  - FAQ: faq.md
  - Changelog: changelog.md
  - Contributing:
      - Development Guide: development-guide.md
      - Docstring Templates: contributing/docstring-templates.md
